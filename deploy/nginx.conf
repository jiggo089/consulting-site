# Nginx site config for consulting.ai-service-hub.ru
# Place at: /etc/nginx/sites-available/consulting
# Symlink:  ln -s /etc/nginx/sites-available/consulting /etc/nginx/sites-enabled/consulting

# HTTP — ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name consulting.ai-service-hub.ru;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main vhost
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name consulting.ai-service-hub.ru;

    access_log /var/log/nginx/consulting-access.log;
    error_log  /var/log/nginx/consulting-error.log;

    ssl_certificate     /etc/letsencrypt/live/consulting.ai-service-hub.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/consulting.ai-service-hub.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/consulting;
    index index.html;

    # Cache static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|gif|ico|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Never cache index.html
    location = / {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files /index.html =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Default routing
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
}
