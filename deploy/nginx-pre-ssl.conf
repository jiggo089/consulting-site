# Temporary HTTP-only nginx config for FIRST deploy (before SSL exists).
# Replaced by nginx.conf after `certbot --webroot` issues the cert.

server {
    listen 80;
    listen [::]:80;
    server_name consulting.ai-service-hub.ru;

    access_log /var/log/nginx/consulting-access.log;
    error_log  /var/log/nginx/consulting-error.log;

    root /var/www/consulting;
    index index.html;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
